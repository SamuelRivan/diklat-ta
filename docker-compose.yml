services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    networks:
      - laravel

  nginx:
    image: nginx:latest

    container_name: laravel-nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel

networks:
  laravel:
